<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>void.lumin — Create</title>
<meta name="description" content="Draw with your emotions. A creative instrument where your emotional state becomes the physics of mark-making.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;user-select:none;-webkit-user-select:none}

/* ── Art canvas (permanent masterpiece) ── */
#art{
  position:fixed;top:0;left:0;
  touch-action:none;cursor:none;
  display:block;
}

/* ── Glow canvas (cursor aura, non-permanent) ── */
#glow{
  position:fixed;top:0;left:0;
  pointer-events:none;
}

/* ── Hidden camera feed ── */
#cam{position:fixed;opacity:0;top:-9999px;pointer-events:none}

/* ═════════════════════════════════
   LOADING SCREEN
═════════════════════════════════ */
#load{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:200;transition:opacity 1s ease;
}
#load.out{opacity:0;pointer-events:none}

.l-logo{
  font-family:'Space Mono',monospace;
  font-size:clamp(2rem,6vw,4.5rem);
  font-weight:700;letter-spacing:.2em;
  background:linear-gradient(135deg,#fff 0%,#555 60%,#111 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.l-sub{
  font-family:'Space Mono',monospace;
  font-size:clamp(.55rem,1.5vw,.75rem);
  letter-spacing:.4em;color:#1e1e1e;
  text-transform:uppercase;margin:.6rem 0 3rem;
}
.l-track{
  width:min(320px,50vw);height:1px;
  background:#0e0e0e;overflow:hidden;margin-bottom:1.2rem;
}
#l-bar{height:100%;width:0%;background:linear-gradient(90deg,#1a1a1a,#888);transition:width .4s ease}
#l-msg{
  font-family:'Space Mono',monospace;
  font-size:.6rem;color:#1e1e1e;letter-spacing:.1em;
}

/* ═════════════════════════════════
   START PROMPT (first visit)
═════════════════════════════════ */
#start{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:50;pointer-events:none;
  transition:opacity .8s ease;
}
#start.out{opacity:0}
.start-text{
  font-family:'Space Mono',monospace;
  font-size:clamp(.6rem,1.8vw,.85rem);
  color:#1c1c1c;letter-spacing:.35em;
  text-transform:uppercase;
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.7}}

/* ═════════════════════════════════
   MINIMAL UI OVERLAY
═════════════════════════════════ */
#ui{
  position:fixed;inset:0;pointer-events:none;
  z-index:30;
  opacity:0;transition:opacity 1s ease;
}
#ui.on{opacity:1}

/* Emotion state — top center */
#em-state{
  position:absolute;top:22px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:.62rem;
  letter-spacing:.3em;color:#141414;
  transition:color .7s ease,opacity .7s ease;
  text-transform:uppercase;
  pointer-events:none;
}
#em-state.flash{color:#fff}

/* Camera dot — bottom right */
#cam-dot{
  position:absolute;bottom:22px;right:22px;
  width:6px;height:6px;border-radius:50%;
  background:#0e0e0e;
  transition:background .6s ease,box-shadow .6s ease;
}
#cam-dot.live{
  background:#1a1a1a;
  box-shadow:0 0 8px 3px rgba(255,255,255,.06);
}

/* Save zone — bottom left */
#save-zone{
  position:absolute;bottom:0;left:0;right:0;
  height:70px;
  pointer-events:all;
}
#save-btn{
  position:absolute;bottom:20px;left:50%;
  transform:translateX(-50%);
  font-family:'Space Mono',monospace;
  font-size:.58rem;letter-spacing:.3em;
  color:#111;background:none;border:none;
  cursor:pointer;
  text-transform:uppercase;
  transition:color .3s ease,text-shadow .3s ease;
  padding:8px 16px;
}
#save-btn:hover{
  color:#888;
  text-shadow:0 0 20px rgba(255,255,255,.12);
}

/* Save flash */
#save-flash{
  position:fixed;inset:0;background:#fff;
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .12s ease;
}
#save-flash.on{opacity:.18}

/* Camera permission error */
#cam-err{
  position:fixed;inset:0;background:#000;z-index:300;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
}
.ce-title{
  font-family:'Space Mono',monospace;
  color:#333;font-size:.9rem;letter-spacing:.12em;
}
.ce-msg{color:#191919;font-size:.75rem;text-align:center;max-width:360px;line-height:1.85;font-family:'Space Mono',monospace}
</style>
</head>
<body>

<!-- Permanent masterpiece canvas -->
<canvas id="art"></canvas>
<!-- Non-permanent cursor glow canvas -->
<canvas id="glow"></canvas>
<!-- Hidden camera -->
<video id="cam" playsinline muted autoplay></video>

<!-- Loading -->
<div id="load">
  <div class="l-logo">void.lumin</div>
  <div class="l-sub">Create</div>
  <div class="l-track"><div id="l-bar"></div></div>
  <div id="l-msg">Requesting camera access…</div>
</div>

<!-- Camera error -->
<div id="cam-err">
  <div class="ce-title">Camera Required</div>
  <div class="ce-msg">void.lumin reads your emotional state through your camera.<br>Allow access and reload.<br><br>Without a camera the canvas still works — your state will be neutral.</div>
</div>

<!-- Start prompt -->
<div id="start">
  <div class="start-text">touch or click anywhere to begin</div>
</div>

<!-- Minimal UI -->
<div id="ui">
  <div id="em-state">NEUTRAL</div>
  <span id="cam-dot"></span>
  <div id="save-zone">
    <button id="save-btn" title="Save your masterpiece as PNG">SAVE MASTERPIECE</button>
  </div>
</div>

<div id="save-flash"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════
//  EMOTION SCIENCE  (RGB colors, physics parameters)
// ═══════════════════════════════════════════════════
const SCI = {
  neutral:   { label:'NEUTRAL',  rgb:[190,190,190], css:'#bebebe', name:'Silver Thread'  },
  happy:     { label:'HAPPY',    rgb:[255,185,  0], css:'#ffb900', name:'Golden Radiance' },
  sad:       { label:'SAD',      rgb:[ 20, 60,200], css:'#143cc8', name:'Blue Gravity'    },
  angry:     { label:'ANGRY',    rgb:[220, 20, 20], css:'#dc1414', name:'Crimson Fracture'},
  fearful:   { label:'FEAR',     rgb:[120, 20,195], css:'#7814c3', name:'Violet Spiral'   },
  surprised: { label:'SURPRISE', rgb:[  0,220,255], css:'#00dcff', name:'Cyan Burst'      },
  disgusted: { label:'DISGUST',  rgb:[ 50,140, 10], css:'#328c0a', name:'Green Recoil'   },
};

// ═══════════════════════════════════════════════════
//  EMOTIONAL PHENOMENA  — the drawing physics
//  Each is a completely different physical force.
//  ctx = art canvas context (marks are PERMANENT)
// ═══════════════════════════════════════════════════
const PHX = {

  // ── NEUTRAL: Silver Thread ─────────────────────
  // Precise flowing lines, like ink in water.
  neutral(ctx, x, y, px, py, pressure) {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    const dist = Math.hypot(x-px, y-py);
    if (dist < 1) { ctx.restore(); return; }

    ctx.globalAlpha = 0.14 + pressure * 0.06;
    ctx.strokeStyle = `hsl(0,0%,${78 + Math.random()*16}%)`;
    ctx.lineWidth   = 0.7 + pressure * 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();

    // Delicate scatter filaments
    if (Math.random() < 0.28) {
      ctx.globalAlpha = 0.05;
      ctx.lineWidth = 0.4;
      const a = Math.atan2(y-py, x-px) + (Math.random()-.5) * 1.1;
      const len = 8 + Math.random() * 22;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x+Math.cos(a)*len, y+Math.sin(a)*len);
      ctx.stroke();
    }
    ctx.restore();
  },

  // ── HAPPY: Golden Radiance ─────────────────────
  // Joy reaches outward. Warm blooms scatter from movement.
  happy(ctx, x, y, px, py, pressure) {
    ctx.save();
    // Core warm stroke
    ctx.globalAlpha = 0.20 + pressure * 0.08;
    ctx.strokeStyle = `hsl(${32+Math.random()*18},100%,${58+Math.random()*12}%)`;
    ctx.lineWidth   = 2 + pressure * 3;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();

    // Radiant bloom particles
    const n = (5 + Math.random() * 9 * pressure) | 0;
    for (let i = 0; i < n; i++) {
      const r = 12 + Math.random() * 65;
      const a = Math.random() * Math.PI * 2;
      ctx.globalAlpha = 0.05 + Math.random() * 0.10;
      ctx.fillStyle = `hsl(${22+Math.random()*45},100%,${60+Math.random()*15}%)`;
      ctx.beginPath();
      ctx.arc(x+Math.cos(a)*r, y+Math.sin(a)*r, 1+Math.random()*3.5, 0, Math.PI*2);
      ctx.fill();
    }
    // Occasional ring echo
    if (Math.random() < 0.15) {
      ctx.globalAlpha = 0.04;
      ctx.strokeStyle = `hsl(40,100%,65%)`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(x, y, 18 + Math.random()*35, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  },

  // ── SAD: Blue Gravity ──────────────────────────
  // Sadness is weight. Marks fall and dissolve downward.
  sad(ctx, x, y, px, py, pressure) {
    ctx.save();
    // Thin fading trail
    ctx.globalAlpha = 0.13 + pressure * 0.05;
    ctx.strokeStyle = `hsl(${218+Math.random()*18},75%,${38+Math.random()*18}%)`;
    ctx.lineWidth   = 0.8 + pressure * 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();

    // Dripping teardrops (fall downward)
    const n = (2 + Math.random() * 5 * pressure) | 0;
    for (let i = 0; i < n; i++) {
      const dx = (Math.random() - .5) * 24;
      const dy = Math.random() * 12;
      const dropH = 6 + Math.random() * 28;
      ctx.globalAlpha = 0.06 + Math.random() * 0.07;
      ctx.fillStyle = `hsl(${213+Math.random()*22},80%,${32+Math.random()*22}%)`;
      ctx.beginPath();
      ctx.ellipse(x+dx, y+dy+dropH*.5, 1.5, dropH*.5, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // Watercolor wash
    if (Math.random() < 0.12) {
      ctx.globalAlpha = 0.03;
      ctx.fillStyle = `hsl(225,70%,40%)`;
      ctx.beginPath();
      ctx.ellipse(x, y, 18+Math.random()*30, 8+Math.random()*12, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  },

  // ── ANGRY: Crimson Fracture ────────────────────
  // Anger is kinetic energy. It shatters.
  angry(ctx, x, y, px, py, pressure) {
    ctx.save();
    // Bold jagged stroke
    ctx.globalAlpha = 0.30 + pressure * 0.12;
    ctx.strokeStyle = `hsl(${355+Math.random()*12},96%,${44+Math.random()*14}%)`;
    ctx.lineWidth   = 3 + pressure * 5;
    ctx.lineCap = 'square'; // sharp
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();

    // Explosive shards radiating outward
    const n = (5 + Math.random() * 8 * pressure) | 0;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const len = 18 + Math.random() * 75 * pressure;
      ctx.globalAlpha = 0.12 + Math.random() * 0.16;
      ctx.strokeStyle = `hsl(${358+Math.random()*25},100%,${48+Math.random()*18}%)`;
      ctx.lineWidth   = 0.5 + Math.random() * 2.2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x+Math.cos(a)*len, y+Math.sin(a)*len);
      ctx.stroke();
    }
    // Pressure point
    if (pressure > 0.6) {
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = `hsl(0,100%,55%)`;
      ctx.beginPath();
      ctx.arc(x, y, 2+pressure*4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  },

  // ── FEAR: Violet Spiral ────────────────────────
  // Fear contracts inward. The canvas pulls tight.
  fearful(ctx, x, y, px, py, pressure) {
    ctx.save();
    ctx.globalAlpha = 0.11 + pressure * 0.06;
    ctx.strokeStyle = `hsl(${272+Math.random()*18},65%,${34+Math.random()*18}%)`;
    ctx.lineWidth   = 0.7 + pressure;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();

    // Contracting rings toward cursor
    const rings = (2 + Math.random() * 3 * pressure) | 0;
    for (let r = 1; r <= rings; r++) {
      const rad = r * 9 * (1.1 - pressure * 0.3);
      ctx.globalAlpha = Math.max(0, 0.07 - r * 0.016);
      ctx.strokeStyle = `hsl(${278+Math.random()*14},60%,${30+r*5}%)`;
      ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.stroke();
    }
    // Dense marks cluster
    if (Math.random() < 0.2) {
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = `hsl(280,60%,25%)`;
      ctx.beginPath();
      ctx.arc(x+(Math.random()-.5)*14, y+(Math.random()-.5)*14, 2+Math.random()*5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  },

  // ── SURPRISE: Cyan Burst ───────────────────────
  // Surprise is instantaneous pattern break. Electric.
  surprised(ctx, x, y, px, py, pressure) {
    ctx.save();
    // Starburst of radial lines
    const n = (8 + Math.random() * 10 * pressure) | 0;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
      const len = 14 + Math.random() * 60 * pressure;
      ctx.globalAlpha = 0.10 + Math.random() * 0.13;
      ctx.strokeStyle = `hsl(${188+Math.random()*16},100%,${62+Math.random()*20}%)`;
      ctx.lineWidth   = 0.5 + Math.random() * 1.8;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x+Math.cos(a)*len, y+Math.sin(a)*len);
      ctx.stroke();
    }
    // Bright core dot
    ctx.globalAlpha = 0.25 + pressure * 0.15;
    ctx.fillStyle = '#00ecff';
    ctx.beginPath(); ctx.arc(x, y, 1.5 + pressure*2, 0, Math.PI*2); ctx.fill();
    // Thin connecting trail
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = '#00e0ff';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();
    ctx.restore();
  },

  // ── DISGUST: Green Recoil ──────────────────────
  // Rejects and pushes marks away from center.
  disgusted(ctx, x, y, px, py, pressure) {
    ctx.save();
    ctx.globalAlpha = 0.13 + pressure * 0.06;
    ctx.strokeStyle = `hsl(${84+Math.random()*22},55%,${30+Math.random()*18}%)`;
    ctx.lineWidth   = 1.4 + pressure * 2;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();
    // Displaced marks pushing outward
    const n = (3 + Math.random() * 5 * pressure) | 0;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const dist = 22 + Math.random() * 50 * pressure;
      ctx.globalAlpha = 0.04 + Math.random() * 0.05;
      ctx.fillStyle = `hsl(${90+Math.random()*20},50%,${28+Math.random()*18}%)`;
      ctx.beginPath();
      ctx.arc(x+Math.cos(a)*dist, y+Math.sin(a)*dist, 2+Math.random()*4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  },
};

// ═══════════════════════════════════════════════════
//  CURSOR GLOW  — shows current emotional state
//  Drawn to glow canvas (non-permanent)
// ═══════════════════════════════════════════════════
function renderGlow(ctx, x, y, emotion, t, isDrawing) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (x === null) return;

  const col = SCI[emotion].rgb;
  const pulse = isDrawing
    ? 1 + 0.18 * Math.sin(t * 9)
    : 0.7 + 0.3 * Math.sin(t * 2.2);
  const r = 18 * pulse;

  // Outer ambient aura
  const aura = ctx.createRadialGradient(x, y, 0, x, y, r * 3.5);
  aura.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${isDrawing ? .08 : .04})`);
  aura.addColorStop(.55, `rgba(${col[0]},${col[1]},${col[2]},${isDrawing ? .04 : .015})`);
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(x, y, r * 3.5, 0, Math.PI * 2); ctx.fill();

  // Inner crosshair ring
  ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${isDrawing ? .45 : .18})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y, r * 0.55, 0, Math.PI * 2); ctx.stroke();

  // Center dot
  ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${isDrawing ? .7 : .28})`;
  ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI * 2); ctx.fill();
}

// ═══════════════════════════════════════════════════
//  VOID LUMIN CREATOR — main application
// ═══════════════════════════════════════════════════
class VoidLuminCreator {
  constructor() {
    this.artCanvas  = document.getElementById('art');
    this.glowCanvas = document.getElementById('glow');
    this.video      = document.getElementById('cam');
    this.ac = this.artCanvas.getContext('2d');
    this.gc = this.glowCanvas.getContext('2d');

    this.emotion    = 'neutral';
    this.prevEmotion= 'neutral';
    this.isDrawing  = false;
    this.cursor     = { x: null, y: null };
    this.prevCursor = { x: null, y: null };
    this.hasStarted = false;
    this._running   = false;
    this._raf       = null;
    this._t         = 0;
    this._DPR       = Math.min(window.devicePixelRatio || 1, 2);
  }

  async init() {
    this._prog(5, 'Requesting camera access…');
    this._resize();
    window.addEventListener('resize', () => this._resize());

    // Camera (optional — no camera = neutral state forever)
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
        audio: false,
      });
      this.video.srcObject = stream;
      await new Promise(r => this.video.addEventListener('loadedmetadata', r, { once: true }));
      await this.video.play();
      this.cameraOK = true;
    } catch (_) {
      this.cameraOK = false;
    }

    this._prog(25, 'Loading emotion detection…');

    if (this.cameraOK) {
      const URLS = [
        'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights',
        'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model',
      ];
      let loaded = false;
      for (const url of URLS) {
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri(url);
          this._prog(62, 'Loading expression model…');
          await faceapi.nets.faceExpressionNet.loadFromUri(url);
          loaded = true; break;
        } catch (_) {}
      }
      this.faceAPIok = loaded;
      if (loaded) this._detectLoop();
    }

    this._prog(90, 'Preparing canvas…');
    this._fillBlack();
    this._setupInteraction();
    this._setupUI();

    this._prog(100, 'Ready.');
    await new Promise(r => setTimeout(r, 450));

    const L = document.getElementById('load');
    L.classList.add('out');
    setTimeout(() => L.style.display = 'none', 1000);
    document.getElementById('ui').classList.add('on');
    document.getElementById('start').style.opacity = '1';

    this._running = true;
    this._loop();
  }

  _resize() {
    const w = window.innerWidth, h = window.innerHeight, D = this._DPR;
    for (const c of [this.artCanvas, this.glowCanvas]) {
      c.width  = w * D; c.height = h * D;
      c.style.width  = w + 'px'; c.style.height = h + 'px';
    }
    this.ac.scale(D, D);
    this.gc.scale(D, D);
    this.W = w; this.H = h;
    // Re-fill black (resize clears canvas)
    this._fillBlack();
  }

  _fillBlack() {
    this.ac.save();
    this.ac.setTransform(1, 0, 0, 1, 0, 0);
    this.ac.fillStyle = '#000';
    this.ac.fillRect(0, 0, this.artCanvas.width, this.artCanvas.height);
    this.ac.restore();
  }

  // ── Face detection (async, ~4fps) ───────────────
  _detectLoop() {
    const go = async () => {
      if (!this._running) return;
      try {
        const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.45 });
        const dets = await faceapi.detectAllFaces(this.video, opts).withFaceExpressions();
        if (dets.length > 0) {
          const ex  = dets[0].expressions;
          const dom = Object.keys(ex).reduce((a, b) => ex[a] > ex[b] ? a : b);
          if (SCI[dom]) this.emotion = dom;
          document.getElementById('cam-dot').classList.add('live');
        } else {
          document.getElementById('cam-dot').classList.remove('live');
        }
      } catch (_) {}
      setTimeout(go, 230);
    };
    go();
  }

  // ── Main render loop ────────────────────────────
  _loop() {
    if (!this._running) return;
    this._t = performance.now() / 1000;

    // Glow follows cursor
    renderGlow(
      this.gc,
      this.cursor.x, this.cursor.y,
      this.emotion, this._t, this.isDrawing
    );

    // Draw if pointer is held
    if (this.isDrawing && this.cursor.x !== null && this.prevCursor.x !== null) {
      const dist = Math.hypot(this.cursor.x - this.prevCursor.x, this.cursor.y - this.prevCursor.y);
      if (dist > 0.5) {
        // Pressure: maps to how fast cursor is moving (fast = more energetic)
        const pressure = Math.min(1, dist / 40);
        const phx = PHX[this.emotion] || PHX.neutral;
        phx(this.ac, this.cursor.x, this.cursor.y,
            this.prevCursor.x, this.prevCursor.y, pressure);
      }
    }

    this.prevCursor = { ...this.cursor };

    // Update emotion label
    if (this.emotion !== this.prevEmotion) {
      this._updateEmBadge();
      this.prevEmotion = this.emotion;
    }

    this._raf = requestAnimationFrame(() => this._loop());
  }

  _updateEmBadge() {
    const el = document.getElementById('em-state');
    const s  = SCI[this.emotion];
    el.textContent = s.label + ' — ' + s.name;
    el.style.color = s.css + 'aa';
    el.classList.add('flash');
    setTimeout(() => {
      el.classList.remove('flash');
      el.style.color = s.css + '22';
    }, 1800);
  }

  // ── Interaction ─────────────────────────────────
  _setupInteraction() {
    const toLocal = (e) => {
      const r = this.artCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - r.left),
        y: (e.clientY - r.top),
      };
    };

    this.artCanvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      this.artCanvas.setPointerCapture(e.pointerId);
      const p = toLocal(e);
      this.cursor = p;
      this.prevCursor = p;
      this.isDrawing = true;
      if (!this.hasStarted) this._onFirstDraw();
    });

    this.artCanvas.addEventListener('pointermove', e => {
      e.preventDefault();
      this.cursor = toLocal(e);
    });

    this.artCanvas.addEventListener('pointerup', e => {
      e.preventDefault();
      this.isDrawing = false;
    });

    this.artCanvas.addEventListener('pointerleave', e => {
      this.isDrawing = false;
      this.cursor = { x: null, y: null };
    });
  }

  _onFirstDraw() {
    this.hasStarted = true;
    const sp = document.getElementById('start');
    sp.classList.add('out');
    setTimeout(() => sp.style.display = 'none', 800);
  }

  // ── UI ───────────────────────────────────────────
  _setupUI() {
    document.getElementById('save-btn').addEventListener('click', () => this._save());
    // Keyboard: S = save, C = clear
    document.addEventListener('keydown', e => {
      if (e.code === 'KeyS' && !e.ctrlKey) this._save();
      if (e.code === 'KeyC' && !e.ctrlKey) this._clear();
    });

    // Initial badge
    const el = document.getElementById('em-state');
    el.textContent = 'NEUTRAL — Silver Thread';
    el.style.color = '#bebebe22';
  }

  _save() {
    // Flash
    const fl = document.getElementById('save-flash');
    fl.classList.add('on');
    setTimeout(() => fl.classList.remove('on'), 300);

    // Download the permanent art canvas (full DPR resolution)
    const link = document.createElement('a');
    const date = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    link.download = `void_lumin_${date}.png`;
    link.href = this.artCanvas.toDataURL('image/png');
    link.click();
  }

  _clear() {
    this._fillBlack();
    this.hasStarted = false;
    const sp = document.getElementById('start');
    sp.style.display = '';
    sp.classList.remove('out');
    sp.style.opacity = '1';
  }

  _prog(p, msg) {
    document.getElementById('l-bar').style.width = p + '%';
    document.getElementById('l-msg').textContent = msg;
  }
}

// ── Boot ─────────────────────────────────────────
new VoidLuminCreator().init().catch(console.error);
</script>
