<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>void.lumin — Create</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;user-select:none;-webkit-user-select:none;font-family:'Outfit',sans-serif;color:#fff}

canvas{position:fixed;top:0;left:0;display:block}
#bg-canvas{z-index:0;background:#111}  /* dark paper */
#art     {z-index:1}
#live    {z-index:2;pointer-events:none}
#fx      {z-index:3;pointer-events:none}

/* ══════════════════════════
   TOP BAR
══════════════════════════ */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;height:52px;
  display:flex;align-items:center;padding:0 16px;gap:10px;
  background:rgba(8,8,8,.94);border-bottom:1px solid rgba(255,255,255,.05);
}
.brand{font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;letter-spacing:.25em;color:#ffb800;margin-right:6px;white-space:nowrap}

/* Tool groups */
.tool-group{display:flex;gap:2px;padding:3px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:22px}
.tool-sep{width:1px;background:rgba(255,255,255,.06);margin:0 4px;align-self:stretch}
.tb{
  background:none;border:none;color:#444;
  font-family:'Space Mono',monospace;font-size:.5rem;
  letter-spacing:.08em;padding:5px 12px;border-radius:18px;cursor:pointer;
  transition:all .18s;text-transform:uppercase;white-space:nowrap;
}
.tb:hover{color:#888}
.tb.on{background:rgba(255,255,255,.10);color:#fff}
.tb.on.eff{background:rgba(0,180,255,.10);color:#00b4ff}

/* DPI mini pills */
#dpi-group{display:flex;gap:2px;margin-left:auto}
.dp{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  color:#333;font-family:'Space Mono',monospace;font-size:.44rem;
  letter-spacing:.1em;padding:4px 10px;border-radius:14px;cursor:pointer;
  transition:all .18s;text-transform:uppercase;
}
.dp:hover{color:#666}
.dp.on{color:#ffb800;border-color:rgba(255,184,0,.3);background:rgba(255,184,0,.06)}

/* ══════════════════════════
   LEFT: SIZE + INTENSITY
══════════════════════════ */
#left{
  position:fixed;left:14px;top:50%;transform:translateY(-50%);
  z-index:20;display:flex;flex-direction:column;align-items:center;gap:10px;
}
#size-ring{
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,8,8,.9);transition:border-color .3s;
}
#size-ring:hover{border-color:rgba(255,255,255,.28)}
#size-dot{border-radius:50%;background:#fff;transition:all .2s}
#size-lbl{font-family:'Space Mono',monospace;font-size:.42rem;color:#2a2a2a;margin-top:-4px}

#bar-wrap{width:2px;height:120px;background:rgba(255,255,255,.04);border-radius:2px;position:relative}
#bar-fill{position:absolute;bottom:0;left:0;width:100%;border-radius:2px;transition:height .25s,background .5s}
#iv-pct{font-family:'Space Mono',monospace;font-size:.44rem;color:#1c1c1c;transition:color .5s}
#emo-lbl{font-family:'Space Mono',monospace;font-size:.42rem;color:#1c1c1c;transition:color .5s;text-transform:uppercase}

/* ══════════════════════════
   RIGHT: AI + CAMERA
══════════════════════════ */
#right{
  position:fixed;right:14px;top:50%;transform:translateY(-50%);
  z-index:20;width:155px;
  background:rgba(6,6,6,.85);border:1px solid rgba(255,255,255,.04);
  border-radius:14px;padding:13px 14px;
  font-family:'Space Mono',monospace;backdrop-filter:blur(18px);
}
.rh{font-size:.48rem;color:#252525;letter-spacing:.14em;margin-bottom:9px;text-transform:uppercase}
.rr{display:flex;justify-content:space-between;margin-bottom:5px}
.rl{font-size:.42rem;color:#1e1e1e}
.rv{font-size:.42rem;color:#3a3a3a;transition:color .3s}
#cam-sect{margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:6px;align-items:center}
#face-circle{width:58px;height:58px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.05);display:none}
#face-cv{width:100%;height:100%;display:block}
#face-emo{font-size:.38rem;color:#1e1e1e;text-align:center;text-transform:uppercase;transition:color .4s}
#cam-btn{
  width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  color:#303030;font-family:'Space Mono',monospace;font-size:.42rem;
  letter-spacing:.1em;padding:5px 0;border-radius:9px;cursor:pointer;transition:all .2s;
  text-transform:uppercase;text-align:center;
}
#cam-btn:hover{color:#666;border-color:rgba(255,255,255,.15)}
#cam-btn.on{color:#ffb800;border-color:rgba(255,184,0,.3);background:rgba(255,184,0,.04)}

/* ══════════════════════════
   COLOR STRIP (bottom)
══════════════════════════ */
#colorbar{
  position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:5px;align-items:center;
  background:rgba(8,8,8,.9);border:1px solid rgba(255,255,255,.06);
  border-radius:30px;padding:6px 14px;
}
.cswatch{
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .18s;
}
.cswatch:hover{transform:scale(1.25)}
.cswatch.on{border-color:#fff;transform:scale(1.18)}
.cswatch-emo{
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.25);transition:all .4s;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;
}
.cswatch-emo:hover{transform:scale(1.2)}
.cswatch-emo.on{border-color:#fff}
#opacity-wrap{display:flex;align-items:center;gap:6px;margin-left:6px;padding-left:8px;border-left:1px solid rgba(255,255,255,.08)}
.op-lbl{font-family:'Space Mono',monospace;font-size:.4rem;color:#2a2a2a}
#opacity-slider{
  -webkit-appearance:none;appearance:none;
  width:60px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;outline:none;cursor:pointer;
}
#opacity-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer;
}

/* ══════════════════════════
   BOTTOM ACTION BAR
══════════════════════════ */
#botbar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;height:44px;
  display:flex;align-items:center;justify-content:center;gap:20px;
  background:rgba(8,8,8,.94);border-top:1px solid rgba(255,255,255,.05);
}
.ba{
  font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.2em;
  color:#1e1e1e;background:none;border:none;cursor:pointer;
  text-transform:uppercase;padding:6px 12px;transition:color .2s;
}
.ba:hover{color:#666}
#btn-eraser.on{color:#ff7864}
#mode-pill{
  padding:4px 14px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);border-radius:14px;
  font-family:'Space Mono',monospace;font-size:.46rem;letter-spacing:.18em;
  color:#282828;transition:all .3s;text-transform:uppercase;
}
#mode-pill.erase{color:#ff7864;border-color:rgba(255,120,100,.3);background:rgba(255,120,100,.05)}

/* ══════════════════════════
   GESTURE HINTS
══════════════════════════ */
#ghints{
  position:fixed;bottom:100px;left:14px;z-index:20;
  font-family:'Space Mono',monospace;font-size:.4rem;
  color:#111;line-height:2.2;letter-spacing:.04em;
}

/* ══════════════════════════
   UNDO TOAST
══════════════════════════ */
#toast{
  position:fixed;top:68px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.18em;
  color:#666;background:rgba(6,6,6,.9);border:1px solid rgba(255,255,255,.06);
  padding:5px 18px;border-radius:20px;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:50;text-transform:uppercase;
}
#toast.on{opacity:1}

/* SAVE FLASH */
#flash{position:fixed;inset:0;z-index:200;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s}
#flash.on{opacity:.22}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="art"></canvas>
<canvas id="live"></canvas>
<canvas id="fx"></canvas>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">void.lumin</div>

  <!-- DRAW TOOLS -->
  <div class="tool-group">
    <button class="tb on" data-tool="pen">Pen</button>
    <button class="tb"    data-tool="pencil">Pencil</button>
    <button class="tb"    data-tool="brush">Brush</button>
    <button class="tb"    data-tool="marker">Marker</button>
    <button class="tb"    data-tool="chalk">Chalk</button>
  </div>

  <div class="tool-sep"></div>

  <!-- EFFECT THEMES -->
  <div class="tool-group">
    <button class="tb eff" data-tool="nebula">Nebula</button>
    <button class="tb eff" data-tool="geometry">Mandala</button>
    <button class="tb eff" data-tool="silk">Silk</button>
    <button class="tb eff" data-tool="ember">Ember</button>
  </div>

  <!-- DPI -->
  <div id="dpi-group">
    <button class="dp on" data-d="screen">1×</button>
    <button class="dp"    data-d="hd">2×</button>
    <button class="dp"    data-d="4k">4K</button>
  </div>
</div>

<!-- LEFT PANEL -->
<div id="left">
  <div id="size-ring" title="Click to cycle size"><div id="size-dot"></div></div>
  <div id="size-lbl">M</div>
  <div id="bar-wrap"><div id="bar-fill" style="height:0%"></div></div>
  <div id="iv-pct">0%</div>

</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div class="rh">Neural Partner</div>
  <div class="rr"><span class="rl">Resonance</span><span class="rv" id="r-res">0%</span></div>
  <div class="rr"><span class="rl">Pattern</span><span class="rv" id="r-pat">—</span></div>
  <div class="rr"><span class="rl">Predict</span><span class="rv" id="r-steps">off</span></div>
  <div id="cam-sect">
    <div id="face-circle"><canvas id="face-cv" width="80" height="80"></canvas></div>
    <div id="face-emo">camera off</div>
    <div id="cam-btn">Enable Camera</div>
  </div>
</div>

<!-- COLOR STRIP -->
<div id="colorbar">
  <div class="cswatch on" data-c="#111111" style="background:#111111" title="Black"></div>
  <div class="cswatch"    data-c="#ffffff" style="background:#ffffff" title="White"></div>
  <div class="cswatch"    data-c="#e63232" style="background:#e63232" title="Red"></div>
  <div class="cswatch"    data-c="#2266ee" style="background:#2266ee" title="Blue"></div>
  <div class="cswatch"    data-c="#ffaa00" style="background:#ffaa00" title="Yellow"></div>
  <div class="cswatch"    data-c="#228844" style="background:#228844" title="Green"></div>
  <div class="cswatch"    data-c="#88240a" style="background:#88240a" title="Brown"></div>
  <div class="cswatch"    data-c="#ee8800" style="background:#ee8800" title="Orange"></div>
  <div class="cswatch"    data-c="#cccccc" style="background:#cccccc" title="Light Grey"></div>
  <div class="cswatch"    data-c="#555555" style="background:#555555" title="Dark Grey"></div>
  <!-- Emotion auto-color -->
  <div class="cswatch-emo" id="emo-swatch" data-c="emo" title="Emotion color (auto)">✦</div>
  <div id="opacity-wrap">
    <span class="op-lbl">opacity</span>
    <input type="range" id="opacity-slider" min="5" max="100" value="85">
  </div>
</div>

<!-- MODE INDICATOR + ACTIONS -->
<div id="botbar">
  <button class="ba" id="btn-clear">Clear</button>
  <button class="ba" id="btn-eraser">Eraser</button>
  <div id="mode-pill">draw</div>
  <button class="ba" id="btn-undo">Undo (Z)</button>
  <button class="ba" id="btn-save">Save</button>
</div>

<!-- GESTURE HINTS -->
<div id="ghints">
  2-finger — erase<br>
  3-finger — undo<br>
  [ / ] — size<br>
  E — eraser
</div>

<div id="toast">undone</div>
<div id="flash"></div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════
   VOID LUMIN — Real drawing tools with Bézier smoothing
   + AI prediction + emotional biometrics (optional)
═══════════════════════════════════════════════════ */

const DPR = Math.min(window.devicePixelRatio || 1, 2);

const bgC  = document.getElementById('bg-canvas');
const artC = document.getElementById('art');
const livC = document.getElementById('live');
const fxC  = document.getElementById('fx');
const facC = document.getElementById('face-cv');

const bgX  = bgC.getContext('2d');
const artX = artC.getContext('2d');
const livX = livC.getContext('2d');
const fxX  = fxC.getContext('2d');
const facX = facC.getContext('2d');

let W = 0, H = 0, canvasScale = DPR, dpiMode = 'screen';

/* ── RESIZE ── */
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  for (const c of [bgC, livC, fxC]) {
    c.width = W * DPR; c.height = H * DPR;
    c.style.width = W + 'px'; c.style.height = H + 'px';
  }
  bgX.setTransform(DPR,0,0,DPR,0,0);
  livX.setTransform(DPR,0,0,DPR,0,0);
  fxX.setTransform(DPR,0,0,DPR,0,0);
  applyDPI(dpiMode);
  drawPaper();
}
window.addEventListener('resize', resize);

function applyDPI(mode) {
  dpiMode = mode;
  const scale = mode === 'screen' ? DPR : mode === 'hd' ? Math.max(DPR,2.5) : Math.max(DPR,4);
  canvasScale = scale;
  artC.width  = Math.round(W * scale); artC.height = Math.round(H * scale);
  artC.style.width = W + 'px'; artC.style.height = H + 'px';
  artX.setTransform(scale, 0, 0, scale, 0, 0);
  clearArt();
  console.log('Canvas:', artC.width + '×' + artC.height);
}

/* ── PAPER BACKGROUND ── */
function drawPaper() {
  bgX.fillStyle = '#111';
  bgX.fillRect(0, 0, W, H);
  // Subtle grain
  for (let i = 0; i < 8000; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const a = Math.random() * 0.03;
    bgX.fillStyle = `rgba(255,255,255,${a})`;
    bgX.fillRect(x, y, 1, 1);
  }
}

function clearArt() {
  artX.clearRect(0, 0, W, H);
}

/* ── UNDO STACK ── */
const undoStack = [];
const UNDO_MAX  = 15;

function saveState() {
  const img = artX.getImageData(0, 0, artC.width, artC.height);
  undoStack.push(img);
  if (undoStack.length > UNDO_MAX) undoStack.shift();
}

function undo() {
  if (!undoStack.length) return;
  artX.putImageData(undoStack.pop(), 0, 0);
  showToast('undone');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 700);
}

/* ── COLORS ── */
let activeColor = '#111111';
let opacityPct  = 85;
let useEmoCcolor = false;

const EMO_CSS = {
  neutral:'#c8c8c8', happy:'#ffb800', sad:'#2244ee',
  angry:'#ee1111', fearful:'#8811cc', surprised:'#00ddff', disgusted:'#33aa11'
};

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

function getDrawColor() {
  const base = useEmoCcolor ? (EMO_CSS[emotion] || '#fff') : activeColor;
  const [r,g,b] = hexToRgb(base);
  return { hex: base, rgba: `rgba(${r},${g},${b},${opacityPct/100})` };
}

/* ── BIOMETRIC STATE ── */
let emotion   = 'neutral';
let intensity = 0;
let smoothIv  = 0;

/* ── TOOLS ── */
let activeTool = 'pen';
let eraserOn   = false;

const SIZES    = [1, 2, 4, 7, 12, 20];
const SIZE_LBL = ['XS','S','M','L','XL','XXL'];
let sizeIdx = 2;

function setSize(i) {
  sizeIdx = Math.max(0, Math.min(5, i));
  document.getElementById('size-lbl').textContent = SIZE_LBL[sizeIdx];
  const d = document.getElementById('size-dot');
  const px = SIZES[sizeIdx] * 1.5;
  d.style.width = px + 'px'; d.style.height = px + 'px';
}
setSize(2);

function setEraser(on) {
  eraserOn = on;
  document.getElementById('btn-eraser').classList.toggle('on', on);
  document.getElementById('mode-pill').textContent = on ? 'erase' : 'draw';
  document.getElementById('mode-pill').classList.toggle('erase', on);
  artC.style.cursor = on ? 'cell' : 'crosshair';
}

/* ══════════════════════════════════════════════════════
   SMOOTH STROKE ENGINE
   - Live canvas holds the current stroke (Bézier)
   - On mouseup, commits live to art permanently
   - This gives proper smooth lines for faces
══════════════════════════════════════════════════════ */
let strokePts  = [];     // accumulated points for current stroke
let isDrawing  = false;
let cx = null, cy = null;
let touchCount = 0;

/* Smooth path from all accumulated points (Catmull-Rom via midpoints) */
function drawSmoothPath(ctx, pts, strokeStyle, lw, comp='source-over') {
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = comp;
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i+1].x) * 0.5;
    const my = (pts[i].y + pts[i+1].y) * 0.5;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.stroke();
  ctx.restore();
}

/* Commit the live canvas onto the permanent art canvas */
function commitStroke() {
  artX.drawImage(livC, 0, 0, artC.width, artC.height);
  livX.clearRect(0, 0, W, H);
}

/* Redraw current stroke on live canvas every frame */
function redrawLive() {
  livX.clearRect(0, 0, W, H);
  if (!isDrawing || strokePts.length < 2) return;

  const col   = getDrawColor();
  const sz    = SIZES[sizeIdx];

  if (eraserOn) {
    // Erase: clear on live AND art directly
    livX.save();
    livX.globalCompositeOperation = 'destination-out';
    livX.strokeStyle = 'rgba(0,0,0,1)';
    livX.lineWidth   = sz * 5;
    livX.lineCap     = 'round'; livX.lineJoin = 'round';
    livX.beginPath();
    livX.moveTo(strokePts[0].x, strokePts[0].y);
    for (let i = 1; i < strokePts.length; i++) livX.lineTo(strokePts[i].x, strokePts[i].y);
    livX.stroke(); livX.restore();
    // Also erase art
    artX.save();
    artX.globalCompositeOperation = 'destination-out';
    artX.strokeStyle = 'rgba(0,0,0,1)';
    artX.lineWidth   = sz * 5;
    artX.lineCap     = 'round'; artX.lineJoin = 'round';
    artX.beginPath();
    artX.moveTo(strokePts[0].x, strokePts[0].y);
    for (let i=1;i<strokePts.length;i++) artX.lineTo(strokePts[i].x, strokePts[i].y);
    artX.stroke(); artX.restore();
    return;
  }

  const DRAW_TOOLS = ['pen','pencil','brush','marker','chalk'];

  if (DRAW_TOOLS.includes(activeTool)) {
    switch(activeTool) {
      case 'pen':
        drawSmoothPath(livX, strokePts, col.rgba, sz * 0.9);
        break;

      case 'pencil': {
        // Thin textured lines — draw multiple sub-strokes with slight offset
        const base = Math.max(0.5, sz * 0.55);
        drawSmoothPath(livX, strokePts, col.rgba, base);
        if (sz > 1 && strokePts.length > 2) {
          const noisy = strokePts.map(p => ({x: p.x+(Math.random()-.5)*sz*0.4, y: p.y+(Math.random()-.5)*sz*0.4}));
          livX.save(); livX.globalAlpha = 0.18;
          drawSmoothPath(livX, noisy, col.rgba, base * 0.5);
          livX.restore();
        }
        break;
      }

      case 'brush': {
        // Organic: main thick stroke + feathered edges
        drawSmoothPath(livX, strokePts, col.rgba, sz * 2.0);
        // Soft edge (feather)
        livX.save(); livX.globalAlpha = 0.22;
        drawSmoothPath(livX, strokePts, col.rgba, sz * 3.5);
        livX.restore();
        break;
      }

      case 'marker': {
        livX.save(); livX.globalAlpha = opacityPct / 200; // markers are always semi-transparent
        drawSmoothPath(livX, strokePts, col.hex, sz * 4.5);
        livX.restore();
        break;
      }

      case 'chalk': {
        // Rough chalk: many tiny dots along path
        livX.save();
        livX.fillStyle = col.hex;
        for (let i = 1; i < strokePts.length; i++) {
          const p = strokePts[i];
          const n = (sz * 3) | 0;
          for (let j = 0; j < n; j++) {
            const ox = (Math.random()-.5)*sz*2.8, oy = (Math.random()-.5)*sz*2.8;
            const a  = 0.05 + Math.random()*0.18;
            livX.globalAlpha = a * (opacityPct/100);
            livX.beginPath();
            livX.arc(p.x+ox, p.y+oy, 0.6+Math.random()*1.2, 0, Math.PI*2);
            livX.fill();
          }
        }
        livX.restore();
        break;
      }
    }
  } else {
    /* ── EFFECT TOOLS ── */
    const rgb = hexToRgb(useEmoCcolor ? (EMO_CSS[emotion]||'#fff') : activeColor);
    const iv  = smoothIv;
    for (let i = 1; i < strokePts.length; i++) {
      drawEffect(livX, strokePts[i-1], strokePts[i], rgb, iv, activeTool);
    }
  }
}

function drawEffect(ctx, p1, p2, rgb, iv, tool) {
  ctx.save();
  switch(tool) {
    case 'nebula': {
      ctx.globalCompositeOperation='screen';
      const r = 10 + iv*28;
      const g = ctx.createRadialGradient(p2.x,p2.y,0,p2.x,p2.y,r);
      g.addColorStop(0,`rgba(${rgb},${0.2+iv*0.2})`);
      g.addColorStop(.5,`rgba(${rgb},${0.05+iv*0.05})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p2.x,p2.y,r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=`rgba(${rgb},0.75)`; ctx.lineWidth=1+iv*2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      if (Math.random()<0.4) {
        const n=(1+iv*5)|0;
        for(let k=0;k<n;k++){
          const a2=Math.random()*Math.PI*2, rd=Math.random()*r;
          ctx.fillStyle=`rgba(255,255,255,${.06+Math.random()*.28})`;
          ctx.beginPath(); ctx.arc(p2.x+Math.cos(a2)*rd,p2.y+Math.sin(a2)*rd,.3+Math.random(),0,Math.PI*2); ctx.fill();
        }
      }
      break;
    }
    case 'geometry': {
      const ccx=W/2, ccy=H/2;
      const sym=iv<0.3?4:iv<0.55?6:iv<0.8?8:12;
      ctx.strokeStyle=`rgba(${rgb},0.8)`; ctx.lineWidth=0.6+iv*1.6; ctx.lineCap='round';
      for(let s=0;s<sym;s++){
        const ang=(s/sym)*Math.PI*2;
        ctx.save(); ctx.translate(ccx,ccy); ctx.rotate(ang);
        ctx.beginPath(); ctx.moveTo(p1.x-ccx,p1.y-ccy); ctx.lineTo(p2.x-ccx,p2.y-ccy); ctx.stroke();
        ctx.scale(1,-1);
        ctx.beginPath(); ctx.moveTo(p1.x-ccx,p1.y-ccy); ctx.lineTo(p2.x-ccx,p2.y-ccy); ctx.stroke();
        ctx.restore();
      }
      break;
    }
    case 'silk': {
      const n=(3+iv*10)|0;
      for(let k=0;k<n;k++){
        ctx.globalAlpha=0.04+0.08*iv*(1-k/n);
        ctx.strokeStyle=`rgba(${rgb},1)`; ctx.lineWidth=0.5+Math.random()*0.7;
        const sp=k*(1.5+iv*9), ox=(Math.random()-.5)*sp, oy=(Math.random()-.5)*sp;
        ctx.beginPath(); ctx.moveTo(p1.x+ox,p1.y+oy);
        ctx.quadraticCurveTo((p1.x+p2.x)/2+ox*1.8,(p1.y+p2.y)/2+oy*1.8,p2.x+ox,p2.y+oy);
        ctx.stroke();
      }
      break;
    }
    case 'ember': {
      ctx.globalCompositeOperation='screen';
      ctx.strokeStyle=`rgba(${rgb},0.85)`; ctx.lineWidth=1+iv*2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      const n=(2+iv*10)|0;
      for(let k=0;k<n;k++){
        const a2=Math.random()*Math.PI*2, r2=2+Math.random()*18*iv;
        const vx=p2.x-p1.x, vy=p2.y-p1.y;
        const px=p2.x+Math.cos(a2)*r2-vy*0.15, py=p2.y+Math.sin(a2)*r2+vx*0.15-r2*0.3;
        const heat=Math.random();
        const rr=heat>0.6?255:Math.round(heat/0.6*255), gg=heat>0.8?255:heat>0.4?Math.round((heat-0.4)*500):0, bb=0;
        ctx.fillStyle=`rgba(${rr},${gg},${bb},${0.08+Math.random()*.25})`;
        ctx.beginPath(); ctx.arc(px,py,.4+Math.random()*1.6,0,Math.PI*2); ctx.fill();
      }
      break;
    }
  }
  ctx.restore();
}

/* ── AI PARTNER ── */
let aiPts=[], coupling=0, pattern='—', predicted=[];

function aiAdd(x,y){
  aiPts.push({x,y,t:performance.now()});
  if(aiPts.length>50) aiPts.shift();
  if(aiPts.length>5){
    let ch=0,pa=null;
    for(let i=1;i<aiPts.length;i++){
      const a=Math.atan2(aiPts[i].y-aiPts[i-1].y,aiPts[i].x-aiPts[i-1].x);
      if(pa!==null){let d=a-pa;d=Math.atan2(Math.sin(d),Math.cos(d));ch+=Math.abs(d);}
      pa=a;
    }
    const avg=ch/(aiPts.length-2);
    pattern=avg<0.08?'Linear Spline':avg<0.28?'Harmonic Curve':'Organic Spiral';
    coupling=Math.max(0.1,Math.min(0.98,1-avg*0.6));
  }
}

function aiPredict(steps){
  const S=aiPts; if(S.length<4){predicted=[];return;}
  const l=S[S.length-1],p=S[S.length-2];
  const dt=Math.max(1,l.t-p.t);
  const vx=(l.x-p.x)/dt,vy=(l.y-p.y)/dt;
  predicted=[{x:l.x,y:l.y}];
  let cx2=l.x,cy2=l.y;
  for(let i=1;i<=steps;i++){
    const t=i*0.016;
    let dx=vx*t,dy=vy*t;
    if(emotion==='happy'){dx+=Math.cos(t*14)*10*smoothIv;dy+=Math.sin(t*14)*10*smoothIv;}
    if(emotion==='sad'){dy+=5*smoothIv*i*0.05;}
    if(emotion==='angry'){dx+=(Math.random()-.5)*5*smoothIv;dy+=(Math.random()-.5)*5*smoothIv;}
    cx2+=dx;cy2+=dy;
    predicted.push({x:cx2,y:cy2});
  }
}

/* ── INPUT: MOUSE ── */
artC.addEventListener('mousedown', e => {
  if(e.button!==0) return;
  saveState();
  strokePts=[]; aiPts=[]; predicted=[];
  cx=e.clientX; cy=e.clientY;
  strokePts.push({x:cx,y:cy});
  aiAdd(cx,cy);
  isDrawing=true;
});
artC.addEventListener('mousemove', e => {
  cx=e.clientX; cy=e.clientY;
  if(isDrawing){ strokePts.push({x:cx,y:cy}); aiAdd(cx,cy); }
});
window.addEventListener('mouseup', () => {
  if(!isDrawing) return;
  if(!eraserOn){
    // Commit final AI prediction to art
    if(predicted.length>1 && smoothIv>0.25){
      const col=getDrawColor();
      const iv=smoothIv, sz=SIZES[sizeIdx];
      const DRAW_TOOLS=['pen','pencil','brush','marker','chalk'];
      if(DRAW_TOOLS.includes(activeTool)){
        drawSmoothPath(artX, predicted, col.rgba.replace(/[\d.]+\)$/,'0.18)'), sz*0.5);
      }
    }
    commitStroke();
  }
  isDrawing=false; strokePts=[]; aiPts=[]; predicted=[];
});

/* ── INPUT: TOUCH ── */
artC.addEventListener('touchstart', e => {
  e.preventDefault();
  touchCount=e.touches.length;
  if(touchCount===1){
    saveState(); strokePts=[]; aiPts=[]; predicted=[];
    const tt=e.touches[0]; cx=tt.clientX; cy=tt.clientY;
    strokePts.push({x:cx,y:cy}); aiAdd(cx,cy); isDrawing=true;
  }
},{passive:false});

artC.addEventListener('touchmove', e=>{
  e.preventDefault();
  touchCount=e.touches.length;
  if(touchCount===2){
    isDrawing=false;
    const t1=e.touches[0],t2=e.touches[1];
    const mx=(t1.clientX+t2.clientX)/2,my=(t1.clientY+t2.clientY)/2;
    const dist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
    const er=Math.max(10,(dist/4)|0);
    artX.save(); artX.globalCompositeOperation='destination-out';
    artX.fillStyle='rgba(0,0,0,1)'; artX.beginPath();
    artX.arc(mx,my,er,0,Math.PI*2); artX.fill(); artX.restore();
  } else if(touchCount===1){
    const tt=e.touches[0]; cx=tt.clientX; cy=tt.clientY;
    if(isDrawing){strokePts.push({x:cx,y:cy}); aiAdd(cx,cy);}
  }
},{passive:false});

artC.addEventListener('touchend', e=>{
  e.preventDefault();
  const prev=touchCount; touchCount=e.touches.length;
  if(prev===3&&touchCount<3) undo();
  if(touchCount===0){
    if(isDrawing&&!eraserOn) commitStroke();
    isDrawing=false; strokePts=[]; aiPts=[]; predicted=[];
  }
},{passive:false});

/* ── KEYBOARD ── */
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  const k=e.key.toLowerCase();
  if(k==='z'||(k==='z'&&(e.ctrlKey||e.metaKey))) undo();
  if(k==='e') setEraser(!eraserOn);
  if(k===']') setSize(sizeIdx+1);
  if(k==='[') setSize(sizeIdx-1);
  if(k==='s'&&!e.ctrlKey) saveMasterpiece();
  if(k==='c'&&!e.ctrlKey){saveState(); clearArt();}
});

/* ── UI CONTROLS ── */
document.querySelectorAll('[data-tool]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-tool]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); activeTool=b.dataset.tool;
    setEraser(false);
  });
});

document.querySelectorAll('[data-d]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-d]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); applyDPI(b.dataset.d);
    showToast('canvas: '+artC.width+'×'+artC.height);
  });
});

document.querySelectorAll('[data-c]').forEach(sw=>{
  sw.addEventListener('click',()=>{
    if(sw.dataset.c==='emo'){
      useEmoCcolor=!useEmoCcolor;
      sw.classList.toggle('on',useEmoCcolor);
      if(useEmoCcolor){
        document.querySelectorAll('.cswatch.on').forEach(x=>x.classList.remove('on'));
      }
    } else {
      useEmoCcolor=false;
      document.querySelectorAll('.cswatch.on').forEach(x=>x.classList.remove('on'));
      document.getElementById('emo-swatch').classList.remove('on');
      sw.classList.add('on');
      activeColor=sw.dataset.c;
    }
  });
});

document.getElementById('opacity-slider').addEventListener('input', e=>{
  opacityPct=parseInt(e.target.value);
});

document.getElementById('size-ring').addEventListener('click', ()=>setSize((sizeIdx+1)%6));
document.getElementById('btn-eraser').addEventListener('click', ()=>setEraser(!eraserOn));
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-clear').addEventListener('click', ()=>{saveState();clearArt();});
document.getElementById('btn-save').addEventListener('click', saveMasterpiece);

function saveMasterpiece() {
  const fl=document.getElementById('flash');
  fl.classList.add('on'); setTimeout(()=>fl.classList.remove('on'),250);
  const link=document.createElement('a');
  link.download=`void_lumin_${activeTool}_${artC.width}x${artC.height}_${Date.now()}.png`;
  link.href=artC.toDataURL('image/png'); link.click();
}

/* ── CAMERA (lazy) ── */
let camActive=false,videoEl=null,faceLoaded=false;
document.getElementById('cam-btn').addEventListener('click', async()=>{
  if(camActive){stopCam();return;} await startCam();
});

async function startCam(){
  const btn=document.getElementById('cam-btn');
  btn.textContent='Starting…';
  try{
    videoEl=document.createElement('video'); videoEl.setAttribute('playsinline',''); videoEl.muted=true;
    const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    videoEl.srcObject=st; await videoEl.play();
    camActive=true; btn.textContent='Loading AI…'; btn.classList.add('on');
    document.getElementById('face-circle').style.display='block';
    if(!faceLoaded){
      await loadScript('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js');
      const mu='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      await faceapi.nets.tinyFaceDetector.loadFromUri(mu);
      await faceapi.nets.faceExpressionNet.loadFromUri(mu);
      faceLoaded=true;
    }
    btn.textContent='Disable Camera'; faceLoop();
  }catch(e){
    console.error(e); btn.textContent='Enable Camera'; btn.classList.remove('on'); camActive=false;
  }
}

function stopCam(){
  camActive=false;
  if(videoEl&&videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t=>t.stop());
  videoEl=null; intensity=0; emotion='neutral';
  document.getElementById('cam-btn').textContent='Enable Camera';
  document.getElementById('cam-btn').classList.remove('on');
  document.getElementById('face-circle').style.display='none';
  document.getElementById('face-emo').textContent='camera off';
}

function loadScript(src){
  return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
}

async function faceLoop(){
  if(!camActive||!videoEl||!faceLoaded) return;
  try{
    if(videoEl.readyState>=2){
      const opts=new faceapi.TinyFaceDetectorOptions({inputSize:160,scoreThreshold:.38});
      const dets=await faceapi.detectAllFaces(videoEl,opts).withFaceExpressions();
      if(dets.length>0){
        const ex=dets[0].expressions;
        const dom=Object.keys(ex).reduce((a,b)=>ex[a]>ex[b]?a:b);
        if(EMO_CSS[dom]){emotion=dom;intensity=ex[dom];}
        facX.save(); facX.clearRect(0,0,80,80);
        facX.beginPath(); facX.arc(40,40,38,0,Math.PI*2); facX.clip();
        facX.scale(-1,1); facX.drawImage(videoEl,-80,0,80,80); facX.restore();
        facX.strokeStyle=EMO_CSS[emotion]+'55'; facX.lineWidth=1.5;
        facX.beginPath(); facX.arc(40,40,38,0,Math.PI*2); facX.stroke();
        document.getElementById('face-emo').textContent=emotion;
        document.getElementById('face-emo').style.color=EMO_CSS[emotion];
      }else{intensity=0;document.getElementById('face-emo').textContent='no face';}
    }
  }catch(_){}
  setTimeout(faceLoop,260);
}

/* ── MAIN LOOP ── */
function loop(now){
  const t=now/1000;
  smoothIv+=(intensity-smoothIv)*0.09;
  const iv=smoothIv, col=getDrawColor();

  // Redraw live stroke (smooth Bézier)
  redrawLive();

  // AI prediction on fx canvas
  fxX.clearRect(0,0,W,H);
  if(isDrawing&&smoothIv>0.25&&!eraserOn){
    const steps=iv<0.5?10:iv<0.75?22:38;
    aiPredict(steps);
    if(predicted.length>1){
      fxX.save();
      fxX.globalAlpha=0.18;
      fxX.strokeStyle=col.hex;
      fxX.lineWidth=0.8; fxX.lineCap='round'; fxX.setLineDash([3,5]);
      fxX.beginPath(); fxX.moveTo(predicted[0].x,predicted[0].y);
      for(let i=1;i<predicted.length;i++) fxX.lineTo(predicted[i].x,predicted[i].y);
      fxX.stroke(); fxX.setLineDash([]); fxX.restore();
    }
  }

  // Cursor glow on fx
  if(cx!==null){
    const pulse=1+0.12*Math.sin(t*6);
    const cr=(6+SIZES[sizeIdx]*1.4)*pulse;
    const gcol=eraserOn?'255,120,100':hexToRgb(col.hex).join(',');
    const grd=fxX.createRadialGradient(cx,cy,0,cx,cy,cr*3.5);
    const alpha=isDrawing?0.18:0.07;
    grd.addColorStop(0,`rgba(${gcol},${alpha})`);
    grd.addColorStop(.5,`rgba(${gcol},${alpha*0.3})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    fxX.fillStyle=grd; fxX.beginPath(); fxX.arc(cx,cy,cr*3.5,0,Math.PI*2); fxX.fill();
    fxX.strokeStyle=`rgba(${gcol},${isDrawing?0.7:0.3})`;
    fxX.lineWidth=1;
    fxX.beginPath(); fxX.arc(cx,cy,cr*0.6,0,Math.PI*2); fxX.stroke();
  }

  // UI
  const css=useEmoCcolor?EMO_CSS[emotion]:activeColor;
  document.getElementById('emo-lbl').textContent=emotion.toUpperCase();
  document.getElementById('emo-lbl').style.color=css+'bb';
  document.getElementById('bar-fill').style.height=(iv*100).toFixed(1)+'%';
  document.getElementById('bar-fill').style.background=css;
  document.getElementById('iv-pct').textContent=Math.round(iv*100)+'%';
  document.getElementById('iv-pct').style.color=css+'88';
  if(useEmoCcolor){
    const esw=document.getElementById('emo-swatch');
    esw.style.background=EMO_CSS[emotion]; esw.style.borderColor=EMO_CSS[emotion];
  }
  document.getElementById('r-res').textContent=Math.round(coupling*100)+'%';
  document.getElementById('r-res').style.color=css;
  document.getElementById('r-pat').textContent=pattern;
  const steps=iv<0.25?0:iv<0.5?10:iv<0.75?22:38;
  document.getElementById('r-steps').textContent=steps?'+'+steps+' pts':'off';

  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
</script>
