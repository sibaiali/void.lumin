<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>void.lumin — Creative Instrument</title>
<meta name="description" content="An interactive canvas that learns your stroke physics and responds to your state. Choose from Nebula, Sacred Geometry, Molecular Crystal, and Silk Flow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;background:#020202;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  font-family:'Outfit',sans-serif;color:#fff;
}

/* Masterpiece Canvas (permanent drawing) */
#art{position:fixed;top:0;left:0;display:block;z-index:1}
/* UI overlay canvas (prediction trails, temporary feedback) */
#glow{position:fixed;top:0;left:0;pointer-events:none;z-index:2}

/* Hidden video feed */
#cam{position:fixed;opacity:0;top:-9999px;left:-9999px;pointer-events:none}

/* ═══════════════════════
   PREMIUM GLASS UI
═══════════════════════ */
#ui{
  position:fixed;inset:0;pointer-events:none;z-index:10;
  opacity:0;transition:opacity 0.8s ease;
}
#ui.on{opacity:1}

/* Top bar: Title & Theme Selector */
#top-bar{
  position:absolute;top:20px;left:20px;right:20px;
  display:flex;justify-content:space-between;align-items:center;
}
.brand{
  font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;
  letter-spacing:.25em;color:#ffb800;text-transform:uppercase;
  text-shadow:0 0 10px rgba(255,184,0,0.2);
}
#themes{
  display:flex;gap:4px;background:rgba(10,10,10,0.7);
  border:1px solid rgba(255,255,255,0.06);border-radius:30px;
  padding:4px;backdrop-filter:blur(20px);pointer-events:all;
}
.theme-btn{
  background:none;border:none;color:#555;
  font-family:'Space Mono',monospace;font-size:.56rem;
  letter-spacing:.15em;padding:6px 14px;border-radius:20px;
  cursor:pointer;transition:all 0.25s ease;text-transform:uppercase;
}
.theme-btn:hover{color:#aaa}
.theme-btn.active{background:rgba(255,255,255,0.08);color:#fff}

/* Left controls: Intensity bar */
#left-panel{
  position:absolute;left:20px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
#intensity-pct{font-family:'Space Mono',monospace;font-size:.56rem;color:#444}
#bar-track{
  width:2px;height:160px;background:rgba(255,255,255,0.03);border-radius:2px;
  position:relative;
}
#bar-fill{
  position:absolute;bottom:0;width:100%;border-radius:2px;
  background:#fff;transition:height 0.3s ease;
}

/* AI Resonance Panel (Right side) */
#ai-panel{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  background:rgba(5,5,5,0.7);border:1px solid rgba(255,255,255,0.04);
  border-radius:16px;padding:16px;width:180px;
  font-family:'Space Mono',monospace;backdrop-filter:blur(20px);
}
.ai-title{font-size:.6rem;color:#444;letter-spacing:.15em;margin-bottom:10px}
.ai-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.5rem}
.ai-lbl{color:#333}
.ai-val{color:#888;transition:color .3s ease}

/* Camera/Expression state (bottom right) */
#cam-panel{
  position:absolute;bottom:20px;right:20px;
  display:flex;flex-direction:column;align-items:flex-end;gap:10px;
  pointer-events:all;
}
#camera-btn{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  color:#666;font-family:'Space Mono',monospace;font-size:.54rem;
  letter-spacing:.15em;padding:8px 16px;border-radius:20px;
  cursor:pointer;transition:all 0.3s ease;
}
#camera-btn:hover{color:#fff;background:rgba(255,255,255,0.08)}
#camera-btn.active{color:#ffb800;border-color:rgba(255,184,0,0.3);background:rgba(255,184,0,0.05)}
.monitor{
  width:72px;height:72px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.05);overflow:hidden;
  background:#030303;display:none;position:relative;
}
.monitor-canvas{width:100%;height:100%;object-fit:cover;display:block}
.monitor-lbl{
  position:absolute;bottom:-18px;right:0;left:0;text-align:center;
  font-family:'Space Mono',monospace;font-size:.44rem;letter-spacing:.12em;
  color:#222;text-transform:uppercase;
}

/* Actions bottom center */
#action-panel{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:20px;pointer-events:all;
}
.action-btn{
  font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.25em;
  color:#333;background:none;border:none;cursor:pointer;
  text-transform:uppercase;padding:8px 16px;transition:all 0.3s ease;
}
.action-btn:hover{color:#fff}

/* Interactive tutorial hint */
#hint-box{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:.48rem;color:#181818;
  letter-spacing:.15em;text-transform:uppercase;text-align:center;
}

/* Flash screen */
#save-flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;transition:opacity .15s ease}
#save-flash.on{opacity:.25}

<body>

<canvas id="art"></canvas>
<canvas id="glow"></canvas>
<video id="cam" playsinline muted autoplay></video>

<!-- MAIN UI -->
<div id="ui">
  <!-- Top bar -->
  <div id="top-bar">
    <div class="brand">void.lumin</div>
    <div id="themes">

  <!-- Left: Intensity bar -->
  <div id="left-panel">
    <div id="intensity-pct">0%</div>

    <button id="camera-btn">Enable Camera</button>
  </div>
</div>

<div id="save-flash"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  EMOTIONS & THEME PHYSICS
// ═══════════════════════════════════════════════════════
const SCI = {
  neutral:   { label:'NEUTRAL',  css:'#cccccc', rgb:[204,204,204] },
  happy:     { label:'HAPPY',    css:'#ffb800', rgb:[255,184,  0] },
  sad:       { label:'SAD',      css:'#1438cc', rgb:[ 20, 56,204] },
  angry:     { label:'ANGRY',    css:'#dc1212', rgb:[220, 18, 18] },
  fearful:   { label:'FEAR',     css:'#7810c4', rgb:[120, 16,196] },
  surprised: { label:'SURPRISE', css:'#00dcff', rgb:[  0,220,255] },
  disgusted: { label:'DISGUST',  css:'#2e8a08', rgb:[ 46,138,  8] },
};

// ═══════════════════════════════════════════════════════
//  THEME BRUSH SYSTEMS
// ═══════════════════════════════════════════════════════
const BRUSHES = {

  // ── NEBULA GALAXY ──────────────────────────────────
  // Gaseous expanding clouds with stardust noise
  nebula: {
    draw(ctx, points, emotion, iv, isPrediction) {
      if (points.length < 2) return;
      const p1 = points[points.length-2], p2 = points[points.length-1];
      const col = SCI[emotion].rgb;
      const glowCol = `rgba(${col[0]}, ${col[1]}, ${col[2]}, ${isPrediction ? 0.08 : 0.22})`;

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      
      // Expand gaseous nebula brush
      const brushRadius = (isPrediction ? 10 : 18) + iv * 32;
      const grad = ctx.createRadialGradient(p2.x, p2.y, 0, p2.x, p2.y, brushRadius);
      grad.addColorStop(0, glowCol);
      grad.addColorStop(0.35, `rgba(${col[0]}, ${col[1]}, ${col[2]}, ${isPrediction ? 0.03 : 0.08})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p2.x, p2.y, brushRadius, 0, Math.PI*2); ctx.fill();

      // Core hot line
      ctx.strokeStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, ${isPrediction ? 0.25 : 0.8})`;
      ctx.lineWidth = isPrediction ? 0.5 : 1.2 + iv * 2.8;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      // Cosmic dust particles (only permanent)
      if (!isPrediction && Math.random() < 0.45) {
        const dustCount = (1 + iv * 8) | 0;
        for (let i = 0; i < dustCount; i++) {
          const a = Math.random() * Math.PI*2;
          const r = Math.random() * brushRadius * 0.9;
          ctx.fillStyle = `rgba(255, 255, 255, ${0.12 + Math.random()*0.35})`;
          ctx.beginPath();
          ctx.arc(p2.x + Math.cos(a)*r, p2.y + Math.sin(a)*r, 0.4 + Math.random()*1.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.restore();
    }
  },

  // ── SACRED GEOMETRY ────────────────────────────────
  // Kaleidoscope symmetrical geometry
  geometry: {
    draw(ctx, points, emotion, iv, isPrediction) {
      if (points.length < 2) return;
      const p1 = points[points.length-2], p2 = points[points.length-1];
      const col = SCI[emotion].rgb;
      
      const width = ctx.canvas.width / (window.devicePixelRatio || 1);
      const height = ctx.canvas.height / (window.devicePixelRatio || 1);
      const cx = width / 2;
      const cy = height / 2;

      ctx.save();
      ctx.strokeStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, ${isPrediction ? 0.35 : 0.85})`;
      ctx.lineWidth = isPrediction ? 0.4 : 0.6 + iv * 2.5;

      const sym = iv < 0.30 ? 4 : iv < 0.55 ? 6 : iv < 0.80 ? 8 : 12;

      for (let i = 0; i < sym; i++) {
        const angle = (i / sym) * Math.PI * 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        
        // Mirror reflection
        ctx.beginPath();
        ctx.moveTo(p1.x - cx, p1.y - cy);
        ctx.lineTo(p2.x - cx, p2.y - cy);
        ctx.stroke();

        // Mirrored reflect
        ctx.scale(1, -1);
        ctx.beginPath();
        ctx.moveTo(p1.x - cx, p1.y - cy);
        ctx.lineTo(p2.x - cx, p2.y - cy);
        ctx.stroke();

        ctx.restore();
      }
      ctx.restore();
    }
  },

  // ── MOLECULAR CRYSTAL ──────────────────────────────
  // Branching lattice grid connections
  crystal: {
    draw(ctx, points, emotion, iv, isPrediction) {
      if (points.length < 2) return;
      const p1 = points[points.length-2], p2 = points[points.length-1];
      const col = SCI[emotion].rgb;

      ctx.save();
      ctx.strokeStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, ${isPrediction ? 0.35 : 0.85})`;
      ctx.lineWidth = isPrediction ? 0.4 : 0.8 + iv * 1.8;

      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

      // Sharp crystal lattices branching off at 60-degree angle
      if (!isPrediction && Math.random() < 0.28) {
        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + (Math.random() < 0.5 ? 1 : -1) * Math.PI/3;
        const len = 8 + Math.random() * 32 * iv;
        ctx.beginPath();
        ctx.moveTo(p2.x, p2.y);
        ctx.lineTo(p2.x + Math.cos(angle)*len, p2.y + Math.sin(angle)*len);
        ctx.stroke();

        // Node dot
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p2.x + Math.cos(angle)*len, p2.y + Math.sin(angle)*len, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  },

  // ── SILK FLOW ──────────────────────────────────────
  // Swirling, organic ribbon flows
  silk: {
    draw(ctx, points, emotion, iv, isPrediction) {
      if (points.length < 2) return;
      const p1 = points[points.length-2], p2 = points[points.length-1];
      const col = SCI[emotion].rgb;

      ctx.save();
      const n = (3 + iv * 10) | 0;
      for (let i = 0; i < n; i++) {
        ctx.globalAlpha = isPrediction ? 0.03 : 0.05 + (0.12 * iv);
        ctx.strokeStyle = `rgba(${col[0]}, ${col[1]}, ${col[2]}, 1)`;
        ctx.lineWidth = 0.4 + Math.random()*0.8;
        
        const offsetRange = i * (2 + iv*12);
        const ox = (Math.random() - 0.5) * offsetRange;
        const oy = (Math.random() - 0.5) * offsetRange;

        ctx.beginPath();
        ctx.moveTo(p1.x + ox, p1.y + oy);
        ctx.quadraticCurveTo(
          (p1.x+p2.x)*0.5 + ox*1.5, (p1.y+p2.y)*0.5 + oy*1.5,
          p2.x + ox, p2.y + oy
        );
        ctx.stroke();
      }
      ctx.restore();
    }
  }
};

// ═══════════════════════════════════════════════════════
//  AI PREDICTIVE PARTNER & LEARNING ENGINE
// ═══════════════════════════════════════════════════════
class AILearningEngine {
  constructor() {
    this.strokeHistory = [];
    this.coupling = 0;
    this.predictedPath = [];
    this.inferredPattern = 'Linear';
  }

  reset() {
    this.strokeHistory = [];
    this.predictedPath = [];
    this.coupling = 0;
    this.inferredPattern = 'Linear';
  }

  addPoint(x, y, t) {
    this.strokeHistory.push({ x, y, t });
    if (this.strokeHistory.length > 40) this.strokeHistory.shift();
    this.learnPattern();
  }

  learnPattern() {
    const H = this.strokeHistory;
    if (H.length < 5) return;

    let totalVel = 0, headingChanges = 0;
    const headings = [];

    for (let i = 1; i < H.length; i++) {
      const dt = (H[i].t - H[i-1].t) || 0.016;
      const dx = H[i].x - H[i-1].x;
      const dy = H[i].y - H[i-1].y;
      const dist = Math.hypot(dx, dy);
      totalVel += dist / dt;

      const heading = Math.atan2(dy, dx);
      headings.push(heading);
      if (headings.length > 1) {
        let diff = heading - headings[headings.length - 2];
        diff = Math.atan2(Math.sin(diff), Math.cos(diff));
        headingChanges += Math.abs(diff);
      }
    }

    const avgCurvature = headingChanges / (H.length - 2);
    if (avgCurvature < 0.08) this.inferredPattern = 'Linear Spline';
    else if (avgCurvature < 0.28) this.inferredPattern = 'Harmonic Curve';
    else this.inferredPattern = 'Organic Spiral';

    this.coupling = Math.max(0.1, Math.min(0.95, 1 - avgCurvature * 0.7));
  }

  predict(steps, emotion, intensity) {
    const H = this.strokeHistory;
    if (H.length < 4) { this.predictedPath = []; return; }

    const last = H[H.length-1], prev = H[H.length-2], pprev = H[H.length-3];
    const dt1 = (last.t - prev.t) || 0.016;
    let vx = (last.x - prev.x) / dt1;
    let vy = (last.y - prev.y) / dt1;

    const dt2 = (prev.t - pprev.t) || 0.016;
    const pvx = (prev.x - prev.x) / dt2;
    const pvy = (prev.y - prev.y) / dt2;
    const ax = (vx - pvx) / dt1;
    const ay = (vy - pvy) / dt1;

    this.predictedPath = [{ x: last.x, y: last.y }];
    let currX = last.x, currY = last.y;

    for (let step = 1; step <= steps; step++) {
      const t = step * 0.016;
      let dx = vx * t + 0.5 * ax * t * t;
      let dy = vy * t + 0.5 * ay * t * t;

      if (emotion === 'happy') {
        const f = 0.04 * intensity * step;
        dx += Math.cos(t * 12) * f * 12;
        dy += Math.sin(t * 12) * f * 12;
      } else if (emotion === 'sad') {
        dy += 0.8 * intensity * step * step * 0.08;
      } else if (emotion === 'angry') {
        dx += (Math.random() - 0.5) * 5 * intensity;
        dy += (Math.random() - 0.5) * 5 * intensity;
      }

      currX += dx; currY += dy;
      this.predictedPath.push({ x: currX, y: currY });
    }
  }
}

// ═══════════════════════════════════════════════════════
//  APPLICATION INITIALIZER
// ═══════════════════════════════════════════════════════
class VoidLuminCreator {
  constructor() {
    this.artC = document.getElementById('art');
    this.glwC = document.getElementById('glow');
    this.video = document.getElementById('cam');
    this.faceC = document.getElementById('face-preview');

    this.ac = this.artC.getContext('2d');
    this.gc = this.glwC.getContext('2d');
    this.fc = this.faceC.getContext('2d');

    this.ai = new AILearningEngine();

    this.theme = 'nebula';
    this.emotion = 'neutral';
    this.intensity = 0;
    this.smoothIv = 0;

    this.isDrawing = false;
    this.cursor = { x: null, y: null };
    this.prevCursor = { x: null, y: null };

    this.cameraActive = false;
    this._DPR = Math.min(window.devicePixelRatio||1, 2);
  }

  init() {
    this._resize();
    window.addEventListener('resize', () => this._resize());
    this._fillBlack();

    this._setupUI();
    this._setupInput();

    document.getElementById('ui').classList.add('on');
    this._loop();
  }

  _resize() {
    const w = window.innerWidth, h = window.innerHeight, D = this._DPR;
    for (const c of [this.artC, this.glwC]) {
      c.width = w * D; c.height = h * D;
      c.style.width = w + 'px'; c.style.height = h + 'px';
    }
    this.ac.scale(D, D); this.gc.scale(D, D);
    this.W = w; this.H = h;
    this._fillBlack();
  }

  _fillBlack() {
    this.ac.fillStyle = '#020202';
    this.ac.fillRect(0,0,this.W,this.H);
  }

  _setupInput() {
    const toLocal = e => {
      const r = this.artC.getBoundingClientRect();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      return { x: clientX - r.left, y: clientY - r.top };
    };

    const down = p => {
      this.cursor = p; this.prevCursor = p;
      this.isDrawing = true;
      this.ai.reset();
      this.ai.addPoint(p.x, p.y, performance.now()/1000);
      document.getElementById('ps-dot').classList.add('on');
      document.getElementById('ps-lbl').textContent = 'painting';
      document.getElementById('ps-lbl').style.color = SCI[this.emotion].css;
    };

    const move = p => { this.cursor = p; };

    const up = () => {
      this.isDrawing = false;
      document.getElementById('ps-dot').classList.remove('on');
      document.getElementById('ps-lbl').textContent = 'hovering';
      document.getElementById('ps-lbl').style.color = '';

      if (this.ai.predictedPath.length > 1) {
        const sys = BRUSHES[this.theme] || BRUSHES.nebula;
        sys.draw(this.ac, this.ai.predictedPath, this.emotion, this.smoothIv, false);
      }
      this.ai.reset();
    };

    this.artC.addEventListener('mousedown', e => down(toLocal(e)));
    this.artC.addEventListener('mousemove', e => move(toLocal(e)));
    window.addEventListener('mouseup', up);

    this.artC.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length > 0) down(toLocal(e.touches[0]));
    }, {passive:false});
    this.artC.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length > 0) move(toLocal(e.touches[0]));
    }, {passive:false});
    window.addEventListener('touchend', up);
  }

  _setupUI() {
    // Theme selectors
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.theme = btn.dataset.t;
      });
    });

    // Actions
    document.getElementById('act-clear').addEventListener('click', () => this._fillBlack());
    document.getElementById('act-save').addEventListener('click', () => this._save());

    // Camera toggle
    const camBtn = document.getElementById('camera-btn');
    camBtn.addEventListener('click', async () => {
      if (this.cameraActive) {
        this._stopCamera();
      } else {
        this._startCamera();
      }
    });
  }

  async _startCamera() {
    const camBtn = document.getElementById('camera-btn');
    camBtn.textContent = 'Starting…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      this.video.srcObject = stream;
      await this.video.play();
      
      this.cameraActive = true;
      camBtn.textContent = 'Disable Camera';
      camBtn.classList.add('active');
      document.getElementById('mon-window').style.display = 'block';
      document.getElementById('bio-status').textContent = 'ACTIVE';
      document.getElementById('bio-status').style.color = '#ffb800';

      this._startBiometricDetection();
    } catch(e) {
      console.error('Camera sensor failed:', e);
      camBtn.textContent = 'Enable Camera';
      alert('Camera access denied or sensor unavailable.');
    }
  }

  _stopCamera() {
    const camBtn = document.getElementById('camera-btn');
    this.cameraActive = false;
    camBtn.textContent = 'Enable Camera';
    camBtn.classList.remove('active');
    document.getElementById('mon-window').style.display = 'none';
    document.getElementById('bio-status').textContent = 'OFF';
    document.getElementById('bio-status').style.color = '';
    
    if (this.video.srcObject) {
      this.video.srcObject.getTracks().forEach(t => t.stop());
    }
    this.intensity = 0;
    this.emotion = 'neutral';
  }

  async _startBiometricDetection() {
    // Face API detector loop
    const detectFace = async () => {
      if (!this.cameraActive) return;
      try {
        if (typeof faceapi !== 'undefined' && faceapi.nets.tinyFaceDetector.params) {
          const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 });
          const dets = await faceapi.detectAllFaces(this.video, opts).withFaceExpressions();
          if (dets.length > 0) {
            const ex = dets[0].expressions;
            const dom = Object.keys(ex).reduce((a,b) => ex[a] > ex[b] ? a : b);
            if (SCI[dom]) {
              this.emotion = dom;
              this.intensity = ex[dom];
            }
            this._faceDetected = true;
          } else {
            this._faceDetected = false;
            this.intensity = 0;
          }
        }
      } catch(_) {}
      setTimeout(detectFace, 250);
    };

    // Load FaceAPI models on demand
    const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    if (typeof faceapi !== 'undefined' && !faceapi.nets.tinyFaceDetector.params) {
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
        await faceapi.nets.faceExpressionNet.loadFromUri(modelUrl);
      } catch(e) {
        console.warn('FaceAPI models load failed:', e);
      }
    }
    detectFace();
  }

  _loop() {
    this._t = performance.now() / 1000;
    this.smoothIv += (this.intensity - this.smoothIv) * 0.08;
    const iv = this.smoothIv;

    // Draw camera preview (if active)
    if (this.cameraActive && this.video.readyState >= 2) {
      this.fc.save();
      this.fc.clearRect(0,0,100,100);
      this.fc.beginPath(); this.fc.arc(50,50,48,0,Math.PI*2); this.fc.clip();
      this.fc.scale(-1, 1);
      this.fc.drawImage(this.video, -100, 0, 100, 100);
      this.fc.restore();

      const col = SCI[this.emotion].css;
      this.fc.strokeStyle = col + (this._faceDetected ? '66' : '11');
      this.fc.lineWidth = 2;
      this.fc.beginPath(); this.fc.arc(50,50,48,0,Math.PI*2); this.fc.stroke();
      document.getElementById('mon-lbl').textContent = this._faceDetected ? this.emotion : 'no face';
      document.getElementById('mon-lbl').style.color = col;
    }

    // Glow Canvas (temporary display)
    this.gc.clearRect(0,0,this.W,this.H);

    // Draw active drawing cursor
    if (this.cursor.x !== null) {
      const col = SCI[this.emotion].rgb;
      const r = (12 + iv * 18) * (1 + 0.15 * Math.sin(this._t * 6));
      this.gc.fillStyle = `rgba(${col[0]},${col[1]},${col[2]}, 0.3)`;
      this.gc.beginPath(); this.gc.arc(this.cursor.x, this.cursor.y, r, 0, Math.PI*2); this.gc.fill();
    }

    // Render permanent user strokes
    if (this.isDrawing && this.cursor.x !== null && this.prevCursor.x !== null) {
      const dist = Math.hypot(this.cursor.x - this.prevCursor.x, this.cursor.y - this.prevCursor.y);
      if (dist > 0.4) {
        this.ai.addPoint(this.cursor.x, this.cursor.y, this._t);
        
        // Draw user stroke segment
        const userPoints = [this.prevCursor, this.cursor];
        const sys = BRUSHES[this.theme] || BRUSHES.nebula;
        sys.draw(this.ac, userPoints, this.emotion, iv, false);

        // Generate AI Prediction
        const steps = iv < 0.30 ? 0 : iv < 0.55 ? 12 : iv < 0.80 ? 25 : 45;
        if (steps > 0) {
          this.ai.predict(steps, this.emotion, iv);
          if (this.ai.predictedPath.length > 1) {
            sys.draw(this.gc, this.ai.predictedPath, this.emotion, iv, true);
          }
        }
      }
    }

    this.prevCursor = { ...this.cursor };

    // Update UI elements
    this._updateUI(iv);

    requestAnimationFrame(() => this._loop());
  }

  _updateUI(iv) {
    const s = SCI[this.emotion];
    
    // Intensity Bar
    document.getElementById('bar-fill').style.height = (iv * 100).toFixed(1) + '%';
    document.getElementById('bar-fill').style.background = s.css;
    document.getElementById('intensity-pct').textContent = Math.round(iv * 100) + '%';
    document.getElementById('intensity-pct').style.color = s.css + 'aa';

    // AI Panel
    document.getElementById('ai-res').textContent = Math.round(this.ai.coupling * 100) + '%';
    document.getElementById('ai-res').style.color = s.css;
    document.getElementById('ai-pattern').textContent = this.ai.inferredPattern;
    const steps = iv < 0.30 ? 0 : iv < 0.55 ? 12 : iv < 0.80 ? 25 : 45;
    document.getElementById('ai-steps').textContent = `+${steps} steps`;
  }

  _save() {
    const flash = document.getElementById('save-flash');
    flash.classList.add('on');
    setTimeout(() => flash.classList.remove('on'), 250);

    const link = document.createElement('a');
    const date = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    link.download = `masterpiece_${this.theme}_${date}.png`;
    link.href = this.artC.toDataURL('image/png');
    link.click();
  }
}

// Launch instantly
window.addEventListener('load', () => {
  document.getElementById('load').style.display = 'none';
  new VoidLuminCreator().init();
});
</script>
